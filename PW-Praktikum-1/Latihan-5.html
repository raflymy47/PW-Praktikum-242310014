<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latihan-5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h2 {
            text-align: center;
        }
        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .box {
            border: 2px solid #4a90e2;
            padding: 10px;
            width: 30%;
        }
        .box h3 {
            text-align: center;
            background-color: #e6f0ff;
            padding: 5px;
        }
        .item {
            margin: 10px 0;
        }
        .tag {
            display: inline-block;
            background-color: gold;
            padding: 5px;
            margin-right: 10px;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: 1px solid black;
        }
        .iframe-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Programming Language Base on Career</h2>

<div class="container">
    <!-- Front-end -->
    <div class="box">
        <h3>Front-end Web Development</h3>
        <div class="item"><span class="tag">JS</span> JavaScript</div>
        <div class="item">Elm</div>
        <div class="item"><span class="tag" style="background:lightblue;">TS</span> TypeScript</div>
    </div>

    <!-- Back-end -->
    <div class="box">
        <h3>Back-end Web Development</h3>
        <div class="item"><span class="tag">JS</span> JavaScript</div>
        <div class="item">Scala</div>
        <div class="item">Go</div>
        <div class="item">Ruby</div>
        <div class="item">Python</div>
    </div>

    <!-- Mobile -->
    <div class="box">
        <h3>Mobile Development</h3>
        <div class="item"><span class="tag">JS</span> JavaScript</div>
        <div class="item">Java</div>
        <div class="item">Objective C</div>
        <div class="item">Swift</div>
    </div>
</div>

<h3>Top 10 Programming Language in 2022</h3>

<div class="iframe-box">
    <!-- iframe ke file lokal Latihan-4 -->
    <iframe src="Latihan-4.html"></iframe>
</div>

<h3>List of programming languages from Wikipedia</h3>

<div class="iframe-box">
    <!-- iframe ke URL -->
    <iframe src="https://en.wikipedia.org/wiki/List_of_programming_languages"></iframe>
</div>

</body>
</html>
